server {
    listen 127.0.0.1:8080;
    client_max_body_size 1000000 ;

    # 1) "/" answers ONLY to GET
    location / {
        allow_methods GET;
        root ./;
        index index.html;
        autoindex on;
    }

    # Covers wherever the .bla test files are served from.
    # cgi_ext says: "if the requested path ends in .bla, run it through cgi_path"
    location /YoupiBanane {
        allow_methods POST;
        root ./;
        cgi .bla ./cgi_test;
    }

    # 3) /post_body answers anything to POST, maxBody = 100
    location /post_body {
        root ./;
        allow_methods POST;
        client_max_body_size 100;
    }

    # 4) /directory/ answers GET, root = YoupiBanane, default file = youpi.bad_extension
    location /directory/ {
        allow_methods GET;
        root ./YoupiBanane;
        index youpi.bad_extension;
    }
}
