# Full config file covering all supported directives and cases
# Based strictly on 42 Webserv subject requirements

# ============================================
# SERVER 1: Basic with all directives
# ============================================
server {
    # Listen directives - multiple formats
    listen 127.0.0.1:8080;
    listen 0.0.0.0:8081;
    listen 9090;
    listen localhost 8082;
    listen localhost;

    # Size limit
    client_max_body_size 1M;

    # Error pages - single and multiple codes
    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;
    error_page 403 404 503 /errors/custom.html;

    # Location: /
    location / {
        root /var/www/html;
        index index.html index.htm;
        autoindex off;
        allow_methods GET POST;
        cgi .php /usr/bin/php-cgi;
    }

    # Location: /only-post
    location /only-post {
        root /var/www/postonly;
        allow_methods POST;
        client_max_body_size 5M;
    }

    # Location: /redirect
    location /redirect {
        return 301 http://example.com;
    }

    # Location: /redirect-default
    location /redirect-default {
        return http://example.org;
    }

    # Location: /upload
    location /upload {
        upload_store /tmp/uploads;
        allow_methods POST;
    }

    # Location: /auto
    location /auto {
        root /var/www/auto;
        autoindex on;
        allow_methods GET;
    }

    # Location: /app with multiple CGI
    location /app {
        root /var/www/app;
        index index.php index.html;
        allow_methods GET POST;
        cgi .php /usr/bin/php-cgi;
        cgi .py /usr/bin/python;
    }
}

# ============================================
# SERVER 2: Minimal server
# ============================================
server {
    listen 8443;
    client_max_body_size 500K;

    location / {
        root /var/www/minimal;
        allow_methods GET;
    }
}

# ============================================
# SERVER 3: With localhost only
# ============================================
server {
    listen localhost:9000;

    location / {
        root /var/www/localhost;
        allow_methods GET POST DELETE;
        autoindex off;
    }
}

# ============================================
# SERVER 4: Multiple locations
# ============================================
server {
    listen 127.0.0.1:7070;
    client_max_body_size 2M;
    error_page 404 /errors/404.html;

    location / {
        root /var/www/site;
        index index.html;
        allow_methods GET;
        autoindex on;
    }

    location /images {
        root /var/www/site/assets;
        autoindex off;
        allow_methods GET;
    }

    location /api {
        root /var/www/site/api;
        allow_methods GET POST DELETE;
        cgi .php /usr/bin/php-cgi;
    }

    location /old {
        return 302 http://newsite.example.com;
    }

    location /data {
        upload_store /var/data/uploads;
        allow_methods POST;
        client_max_body_size 10M;
    }
}